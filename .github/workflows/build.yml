name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 ninja-build

      - name: Configure
        run: cmake --preset mingw64

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: arcdps-universal-loader
          path: build/arcdps_universal_loader.dll

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: arcdps-universal-loader
          path: dist/

      - name: Create release archive
        run: cd dist && zip -r ../arcdps-universal-loader.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: arcdps-universal-loader.zip
          generate_release_notes: true
